<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Godot Dev Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#cbd5e1', 300: '#94a3b8',
                    400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b',
                    800: '#0f172a', 900: '#020617' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark-900 text-dark-100 min-h-screen">
  <nav class="bg-dark-800 border-b border-dark-600 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a href="/" class="text-lg font-bold text-purple-400 hover:text-purple-300">
        🎮 Godot Dev Portal
      </a>
      <a href="/projects" class="text-dark-200 hover:text-white text-sm">Projects</a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script>
    function runTests(projectId, iterationId) {
      const outputEl = document.getElementById('test-output-' + iterationId);
      const logsEl = document.getElementById('test-logs-' + iterationId);
      outputEl.classList.remove('hidden');
      logsEl.textContent = '🔄 Starting test run...\n';

      const evtSource = new EventSource(`/projects/${projectId}/iterations/${iterationId}/test-stream`);
      evtSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'log') {
          logsEl.textContent += data.line + '\n';
          logsEl.scrollTop = logsEl.scrollHeight;
        } else if (data.type === 'complete') {
          logsEl.textContent += '\n═══════════════════════\n';
          logsEl.textContent += data.passed ? '✅ ALL TESTS PASSED\n' : '❌ TESTS FAILED\n';
          logsEl.textContent += `Exit code: ${data.exit_code}\n`;
          if (data.report_id) {
            logsEl.textContent += `Report #${data.report_id}\n`;
          }
          evtSource.close();
          // Reload page to show new report after 2s
          setTimeout(() => window.location.reload(), 2000);
        } else if (data.type === 'error') {
          logsEl.textContent += '❌ ERROR: ' + data.message + '\n';
          evtSource.close();
        }
      };
      evtSource.onerror = () => {
        logsEl.textContent += '⚠️ Connection lost\n';
        evtSource.close();
      };
    }
  </script>
</body>
</html>
